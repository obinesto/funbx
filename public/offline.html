<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>You are offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        background: Canvas;
        color: CanvasText;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 480px;
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      p {
        color: color-mix(in srgb, CanvasText 70%, transparent);
        line-height: 1.5;
      }

      a {
        align-items: center;
        background: #ff0033;
        border-radius: 999px;
        color: white;
        display: inline-flex;
        font-weight: 600;
        justify-content: center;
        margin-top: 1rem;
        min-height: 44px;
        padding: 0 1.25rem;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid color-mix(in srgb, #ff0033 35%, CanvasText);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Reconnect to continue watching, searching, and managing your library.
      </p>
      <a href="/">Back to homepage</a>
    </main>
    <script>
      window.addEventListener("online", () => {
        window.location.replace("/");
      });
    </script>
  </body>
</html>
